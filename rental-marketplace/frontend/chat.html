<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages | LendeX</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body style="background: #f1f5f9; height: 100vh; overflow: hidden; display: flex; flex-direction: column;">

    <nav style="flex-shrink: 0;">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center; padding: 0;">
            <a href="index.html" class="logo">LendeX</a>
            <div id="nav-links" class="nav-links">
                <a href="index.html">Explore</a>
                <a href="dashboard.html">Dashboard</a>
            </div>
        </div>
    </nav>

    <main style="flex: 1; display: flex; overflow: hidden; padding: 1.5rem;" class="container">
        <div
            style="display: grid; grid-template-columns: 320px 1fr; width: 100%; height: 100%; background: white; border-radius: var(--radius-lg); overflow: hidden; border: 1px solid var(--border); box-shadow: var(--shadow-lg);">

            <!-- Sidebar: Conversations -->
            <div
                style="border-right: 1px solid var(--border); background: #f8fafc; display: flex; flex-direction: column;">
                <div style="padding: 1.5rem; border-bottom: 1px solid var(--border); background: white;">
                    <h2 style="font-size: 1.25rem; font-weight: 800; letter-spacing: -0.025em;">Messages</h2>
                </div>
                <div id="conv-list" style="flex: 1; overflow-y: auto;">
                    <!-- Items -->
                </div>
            </div>

            <!-- Main: Chat Window -->
            <div style="display: flex; flex-direction: column; background: white;">
                <div id="chat-header"
                    style="padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); background: white; display: flex; align-items: center; gap: 1rem;">
                    <h3 style="font-size: 1rem; font-weight: 700;">Select a conversation</h3>
                </div>

                <div id="msg-list"
                    style="flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 0.75rem; background: #f8fafc;">
                    <!-- Messages -->
                </div>

                <form id="chat-form" class="hidden"
                    style="padding: 1rem; background: white; border-top: 1px solid var(--border); display: flex; gap: 0.75rem; align-items: center;">
                    <input type="text" id="msg-input" class="form-input"
                        style="margin-bottom: 0; border-radius: 999px; padding: 12px 20px;"
                        placeholder="Type your message..." required>
                    <button type="submit" class="btn btn-primary"
                        style="padding: 12px; border-radius: 50%; min-width: 48px; min-height: 48px; justify-content: center;">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </form>
            </div>

        </div>
    </main>

    <script type="module" src="js/auth.js"></script>
    <script type="module">
        let activeChatId = null;

        window.addEventListener("authStateReady", async () => {
            if (!window.dbUser) {
                window.location.href = "login.html";
                return;
            }

            try {
                const res = await fetch(`${window.API_URL}/chat/conversations`, {
                    headers: { 'Authorization': `Bearer ${window.authToken}` }
                });
                const { data } = await res.json();
                const container = document.getElementById('conv-list');

                if (data.length === 0) {
                    container.innerHTML = '<div style="padding: 2rem; text-align: center; color: var(--text-muted);">No messages yet.</div>';
                    return;
                }

                container.innerHTML = data.map(c => {
                    const other = c.participants.find(p => p._id !== window.dbUser._id);
                    return `
                        <div class="conv-item" data-id="${c._id}" data-name="${other?.name || 'Peer'}" style="padding: 1.25rem; border-bottom: 1px solid var(--border); cursor: pointer; transition: all 0.2s;">
                            <div style="display: flex; gap: 1rem; align-items: center;">
                                <div style="width: 40px; height: 40px; background: var(--primary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0;">
                                    ${(other?.name || 'P')[0]}
                                </div>
                                <div style="overflow: hidden;">
                                    <p style="font-weight: 700; font-size: 0.9375rem; margin-bottom: 0.125rem;">${other?.name || 'Peer'}</p>
                                    <p style="font-size: 0.8125rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${c.lastMessage || 'Start a conversation'}</p>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');

                document.querySelectorAll('.conv-item').forEach(el => {
                    el.onclick = () => loadChat(el.dataset.id, el.dataset.name, el);
                });

            } catch (err) { console.error(err); }
        });

        const loadChat = async (id, name, elem) => {
            document.querySelectorAll('.conv-item').forEach(el => el.style.background = 'transparent');
            elem.style.background = 'white';

            document.getElementById('chat-header').innerHTML = `<h3 style="font-size: 1rem; font-weight: 700;">${name}</h3>`;
            document.getElementById('chat-form').classList.remove('hidden');
            activeChatId = id;

            const list = document.getElementById('msg-list');
            list.innerHTML = '<p class="text-center">Loading messages...</p>';

            try {
                const res = await fetch(`${window.API_URL}/chat/${id}/messages`, {
                    headers: { 'Authorization': `Bearer ${window.authToken}` }
                });
                const { data } = await res.json();

                list.innerHTML = data.map(m => {
                    const isMine = m.sender === window.dbUser._id;
                    return `
                        <div style="display: flex; flex-direction: column; align-items: ${isMine ? 'flex-end' : 'flex-start'};">
                            <div style="max-width: 75%; padding: 0.75rem 1rem; border-radius: 1.25rem; font-size: 0.9375rem; line-height: 1.4; 
                                ${isMine ? 'background: var(--primary); color: white; border-bottom-right-radius: 0.25rem;' : 'background: white; color: var(--text-main); border: 1px solid var(--border); border-bottom-left-radius: 0.25rem;'}">
                                ${m.text}
                            </div>
                        </div>
                    `;
                }).join('');
                list.scrollTop = list.scrollHeight;
            } catch (err) { list.innerHTML = "Failed to load chat."; }
        };

        document.getElementById('chat-form').onsubmit = async (e) => {
            e.preventDefault();
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if (!text || !activeChatId) return;

            try {
                const res = await fetch(`${window.API_URL}/chat/${activeChatId}/messages`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${window.authToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ text })
                });
                const { data } = await res.json();

                const list = document.getElementById('msg-list');
                list.innerHTML += `
                    <div style="display: flex; flex-direction: column; align-items: flex-end;">
                        <div style="max-width: 75%; padding: 0.75rem 1rem; border-radius: 1.25rem; background: var(--primary); color: white; border-bottom-right-radius: 0.25rem; font-size: 0.9375rem;">
                            ${data.text}
                        </div>
                    </div>
                `;
                list.scrollTop = list.scrollHeight;
                input.value = '';
            } catch (err) { console.error(err); }
        };
    </script>
</body>

</html>
